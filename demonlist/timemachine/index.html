<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>All Demon List - Time Machine</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            margin: 0;
            color: #ffffff;
            font-family: Montserrat, sans-serif;

            background: url("/images/background.png") no-repeat center center fixed;
            background-size: cover;
        }

        header {
            text-align: center;
            padding: 30px 0;
            font-size: 24px;
            font-weight: bold;
            border-bottom: 2px solid #222;
            padding-top:90px;
        }

        header h1 {
            margin: 0;
            color: #ff4444;
        }

        .list {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .entry {
            display: flex;
            align-items: center;
            background-color: #151515;
            border: 1px dashed #333;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            transition: transform 0.15s ease;
        }

        .entry:hover {
            transform: scale(1.01);
            border-color: #666;
        }

        .info {
            flex: 1;
        }

        .name {
            font-size: 24px;
            font-weight: bold;
        }

        .name a {
            color: #ffffff;
            text-decoration: none;
            transition: color 0.2s ease;
        }    

        .name a:hover {
            color: #cccccc;
        }

        .host {
            margin-top: 6px;
            font-size: 14px;
            color: #bbbbbb;
        }
    </style>
    <body>

        <div class="topbar">

            <div class="left">
                <a href="/">
                    <img src="/images/logo.png" class="logo">
                </a>
            </div>
            <div class="right">
                <a href="https://discord.gg/CBKpyuatem" class="discord" target="_blank">
                    Discord
                </a>
                <a href="/demonlist" class=demon-list>
                    Demon List
                </a>
            </div>

        </div>
        
    </body>
</head>
</html>
