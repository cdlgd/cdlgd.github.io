<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/levels.js"></script>

    <meta charset="UTF-8">
    <title>All Demon List</title>
    <style>
        body {
            color: white;
            font-family: Montserrat;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;

            background: url("../images/background.png") no-repeat center center fixed;
            background-size: cover;
        }

        a {
            color: #ff4444;
            text-decoration: none;
        }

        .container {
            max-width: 800px;
            margin: auto;
            margin-top: 70px;
            text-align: center;
            
            border: 1px solid rgba(255, 255, 255, 0.15);
            
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .card-inner {
            background: rgba(0, 0, 0, 0.85);
            padding: 30px;
            border-radius: 16px;
        }

        h1 {
            font-size: 50px;
        }

        .description {
            color: #bbbbbb;
            font-style: italic;
            font-size: 18px;
        }

        .information {
            font-size: 24px;

            margin-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.15);
            padding-top: 15px;
            font-size: 20px;
        }

        .information p {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 8px 0;
        }

        .information strong {
            margin-right: 10px;
        }

        .information span {
            margin-right: 24px;
        }
        
    </style>
</head>
<body>

    <div class="topbar">

        <div class="left">
            <a href="/">
                <img src="images/logo.png" class="logo">
            </a>
        </div>
        <div class="right">
            <a href="https://discord.gg/CBKpyuatem" class="discord" target="_blank">
                Discord
            </a>
            <a href="/timemachine" class=time-machine>
                Time Machine
            </a>
        </div>

    </div>

    <div id="level-container" class="container"></div>
        <div class="card-inner">
            <script>
                const params = new URLSearchParams(window.location.search);
                const key = params.get("level");

                const data = levels[key];

                if(data){
                    document.body.style.backgroundColor = data.bgColor;

                    document.getElementById("level-container").innerHTML = `

                    <h1>${data.name}</h1>

                    <iframe width="800" height="450"
                        src="https://www.youtube.com/embed/${data.youtube}"
                        frameborder="0" allowfullscreen>
                    </iframe>

                    <p><span class="description">${data.description}</span></p>

                    <div class="information">
                        <p><span><strong>Creator </strong> ${data.creator}</span><span><strong>Verifier </strong> ${data.verifier}</span></p>
                        <p><span><strong>ID </strong> ${data.id}</span><span><strong>Password </strong> ${data.password}</span></p>
                        <p><span><strong>Length </strong>${data.length}</span><span><strong>Object Count </strong>${data.object}</span></p>
                        <p><span><strong>Upload Version </strong> ${data.version}</span></p>
                        <p><span><strong>Difficulty </strong> ${data.difficulty}</span><span><strong>Rating </strong>${data.rating}</span></p>
                        <p><span><strong>Song </strong>${data.song}</span></p>
                        <p><span><strong>Trivia </strong>${data.trivia}</span></p>
                    </div>
                    `;
                }

            </script>
        </div>

</body>
</html>
